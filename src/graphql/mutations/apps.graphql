mutation CreateApp($input: CreateAppInput!) {
  createApp(input: $input) {
    id
    name
    description
    url
    icon
    isActive
    createdAt
    updatedAt
  }
}

mutation UpdateApp($updateAppId: ID!, $input: UpdateAppInput!) {
  updateApp(id: $updateAppId, input: $input) {
    id
    name
    description
    url
    icon
    isActive
    createdAt
    updatedAt
  }
}

mutation DeleteApp($id: ID!) {
  deleteApp(id: $id)
}

mutation EnableApp($id: ID!) {
  enableApp(id: $id)
}

mutation DestroyApp($id: ID!) {
  destroyApp(id: $id)
}